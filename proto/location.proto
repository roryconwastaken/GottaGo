syntax = "proto3";

package location;

option go_package = "github.com/yourname/gotta-go/location-svc/gen/location";

service LocationService {
  rpc GetNearbyOperators(NearbyRequest) returns (NearbyResponse);
}

message NearbyRequest {
  double lat = 1;
  double lng = 2;
  double radius_km = 3;
}

message OperatorEntry {
  string operator_id = 1;
  double lat = 2;
  double lng = 3;
  double distance_km = 4;
}

message NearbyResponse {
  repeated OperatorEntry operators = 1;
}