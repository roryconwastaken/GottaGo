services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gottago
      POSTGRES_PASSWORD: gottago
      POSTGRES_DB: gottago
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nats:
    image: nats:2
    ports:
      - "4222:4222"
      - "8222:8222"